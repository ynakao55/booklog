services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: booklog
      POSTGRES_USER: booklog
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://booklog:password@db:5432/booklog
      RAILS_LOG_TO_STDOUT: "1"
      SECRET_KEY_BASE: dev-secret-key
    ports:
      - "3000:3000"
    depends_on:
      - db
    command: bash -lc "bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0 -p 3000"

volumes:
  pgdata:
